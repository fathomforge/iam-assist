name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # GoReleaser needs this to create the GitHub release
  packages: write   # For GHCR container image, if enabled later

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history + tags

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set HOMEBREW_TAP_GITHUB_TOKEN as a repo secret to
          # auto-push a formula to fathomforge/homebrew-tap on each release.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
